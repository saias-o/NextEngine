name: Saida Engine CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: engine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  authoring-core:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-vulkan-loader
            mingw-w64-ucrt-x86_64-glfw
            mingw-w64-ucrt-x86_64-glm
            mingw-w64-ucrt-x86_64-shaderc

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DSAIDA_ENABLE_XR=OFF

      - name: Build authoring targets
        run: cmake --build build --target saida_tool saida_authoring_op_tests

      - name: Test authoring targets
        run: ctest --test-dir build --output-on-failure -R "saida_authoring_op_tests|saida_tool_"
