name: Saida Engine CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: engine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  authoring-core:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-vulkan-loader
            mingw-w64-ucrt-x86_64-glfw
            mingw-w64-ucrt-x86_64-glm
            mingw-w64-ucrt-x86_64-shaderc

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DSAIDA_ENABLE_XR=OFF

      - name: Build authoring targets
        run: cmake --build build --target saida_tool saida_authoring_op_tests

      - name: Test authoring targets
        run: ctest --test-dir build --output-on-failure -R "saida_authoring_op_tests|saida_tool_"

  # Build Linux complet + ctest + preuve de déterminisme du fold (P0.2).
  # Conteneur Debian bookworm exprès : même glibc (2.36) que les images
  # node:24-slim de la plateforme — le binaire publié en artefact est celui
  # que les images Docker apps/api et apps/workers embarquent.
  linux-tool:
    runs-on: ubuntu-latest
    container: debian:bookworm-slim
    steps:
      - name: Install toolchain
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git ca-certificates \
            libvulkan-dev libglfw3-dev libglm-dev glslc
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSAIDA_ENABLE_XR=OFF -DSAIDA_ENABLE_MCP=OFF

      - name: Build
        run: cmake --build build

      - name: Test (ctest complet)
        run: ctest --test-dir build --output-on-failure

      - name: Fold determinism (byte-identique à la référence Windows)
        run: |
          ./build/bin/saida_tool apply-ops tests/fixtures/fold-determinism/base.json \
            tests/fixtures/fold-determinism/ops.json --out /tmp/fold-out.json
          cmp /tmp/fold-out.json tests/fixtures/fold-determinism/expected.json
          echo "fold byte-identique ✓"

      - name: Engine manifest (artefact)
        run: ./build/bin/saida_tool describe-engine > /tmp/engine-manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: saida-tool-linux
          path: build/bin/saida_tool
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: engine-manifest
          path: /tmp/engine-manifest.json
          if-no-files-found: error

# Le build web-wasm (runtime Emscripten + authoring wasm) vit dans un workflow
# séparé (web-artifacts.yml) : c'est le maillon le plus fragile (emsdk + naga +
# port WebGPU) et il ne doit PAS gater la conclusion de ce workflow, dont
# l'artefact `saida-tool-linux` est la dépendance dure de la plateforme.
